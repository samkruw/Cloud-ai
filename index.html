<!DOCTYPE html>
<html>
	<head>
		<title>Codebeautify.org Text to HTML Converter</title>
	</head>
	<body>
		<p>
			<!DOCTYPE html>
			<html lang="de">
				<head>
					<meta charset="UTF-8">
						<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
							<title>CloudStream AI</title>
							<script src="https://cdn.tailwindcss.com"></script>
							<script src="https://unpkg.com/lucide@latest"></script>
							<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
							<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
							<style> 
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); 
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; } 
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; } 
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } 
    </style>
						</head>
						<body>
							<div id="root">
								<div id="loading-screen" style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px;">
									<div class="loader"></div>
									<p id="status-text" style="font-size: 10px; color: #666; letter-spacing: 2px; font-weight: bold;">LADE MODULE...</p>
									<div id="error-log" style="color: #ef4444; font-size: 10px; max-width: 80%; text-align: center;"></div>
								</div>
							</div>
							<script type="module"> 
        const status = document.getElementById('status-text'); 
        const errorLog = document.getElementById('error-log'); 
 
        try { 
            status.innerText = "VERBINDE FIREBASE..."; 
             
            import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js"; 
            import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js"; 
            import { getFirestore } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js"; 
 
            const firebaseConfig = { 
                apiKey: "AIzaSyDi9s3g6nyObg5mZYz_n7qgr982h2MrO0o", 
                authDomain: "cloud-ai-a1722.firebaseapp.com", 
                projectId: "cloud-ai-a1722", 
                storageBucket: "cloud-ai-a1722.firebasestorage.app", 
                messagingSenderId: "94852405834", 
                appId: "1:94852405834:web:4bba853d9a20807b84a4b3" 
            }; 
 
            const app = initializeApp(firebaseConfig); 
            const auth = getAuth(app); 
            const db = getFirestore(app); 
 
            status.innerText = "REDEEME CORE..."; 
 
            const App = () => { 
                const [user, setUser] = React.useState(null); 
                const [email, setEmail] = React.useState(''); 
                const [password, setPassword] = React.useState(''); 
                const [err, setErr] = React.useState(''); 
 
                React.useEffect(() => { 
                    const unsub = onAuthStateChanged(auth, (u) => { 
                        setUser(u); 
                        const ls = document.getElementById('loading-screen'); 
                        if (ls) ls.style.display = 'none'; 
                    }); 
                    return unsub; 
                }, []); 
 
                if (!user) { 
                    return ( 
                        
								<div className="min-h-screen flex items-center justify-center p-8 flex-col gap-10">
									<h1 className="text-5xl font-black italic text-blue-600 tracking-tighter">CloudStream</h1>
									<div className="w-full max-w-sm bg-[#121212] p-8 rounded-[40px] border border-white/5 shadow-2xl space-y-4">
										<input type="email" placeholder="E-Mail" className="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none text-white text-sm" value={email} onChange={e => setEmail(e.target.value)} />
										<input type="password" placeholder="Passwort" className="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none text-white text-sm" value={password} onChange={e => setPassword(e.target.value)} /> 
                                {err && 
										<p className="text-red-500 text-[10px] text-center">{err}</p>} 
                                
										<button onClick={async () => { 
                                    try { await signInWithEmailAndPassword(auth, email, password); } 
                                    catch (e) { setErr(e.message); } 
                                }} className="w-full bg-blue-600 py-4 rounded-[20px] font-black uppercase text-sm tracking-widest">Login</button>
									</div>
								</div> 
                    ); 
                } 
 
                return ( 
                    
								<div className="p-10 text-center space-y-6">
									<div className="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
										<div className="text-blue-500 font-bold">OK</div>
									</div>
									<h1 className="text-2xl font-black italic">System Online</h1>
									<p className="text-gray-500 text-sm">{user.email}</p>
									<button onClick={() => signOut(auth)} className="bg-red-500/10 text-red-500 px-6 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest">Logout</button>
								</div> 
                ); 
            }; 
 
            const root = ReactDOM.createRoot(document.getElementById('root')); 
            root.render(React.createElement(App)); 
 
        } catch (e) { 
            errorLog.innerText = "CRITICAL_ERROR: " + e.message; 
            console.error(e); 
        } 
    
							</script>
						</body>
					</html>
				</p>
			</body>
		</html>
