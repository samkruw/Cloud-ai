                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: messages, temperature: temp || 0.7, max_tokens: 4096 })

                const data = await res.json();

                semanticSearch: async function(query, content) {
                    if (!content || content.length === 0) return [];

                        const result = await callGroq([{ role: 'user', content: prompt }], 0.3);
                        return JSON.parse(result.replace(/```json|```/g, '').trim());

                        return content.filter(i => (i.title + '').toLowerCase().includes(query.toLowerCase())).map(i => i.id);

                    const prompt = 'Validiere URL: ' + url + '. Gib JSON zurueck: {"valid":true,"trustScore":85,"risks":[],"recommendation":"OK"}';

            async function handleImport() {
                if (!url.trim()) return;
                setLoading(true);
                setError('');
                
                try {
                    let validatedUrl = url;
                    if (url.includes('github.com') && !url.includes('raw.githubusercontent.com')) {
                        validatedUrl = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                    }
                    
                    if (groq) {
                        const val = await groq.validateMirror(validatedUrl);
                        if (!val.valid || val.trustScore < 30) {
                            setError('Validierung fehlgeschlagen: ' + val.recommendation);
                            setLoading(false);
                            return;
                        }
                    }
                    
                    const res = await fetch(validatedUrl);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    
                    if (!Array.isArray(data)) throw new Error('Array erwartet');
                    props.onImport(data, validatedUrl);
                    setUrl('');

                    setError(err.message);

                setLoading(false);
