<!DOCTYPE html>
<html>
	<head>
		<title>Codebeautify.org Text to HTML Converter</title>
	</head>
	<body>
		<p>
			<!DOCTYPE html>
			<html lang="de">
				<head>
					<meta charset="UTF-8">
						<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
							<title>CloudStream AI</title>
							<script src="https://cdn.tailwindcss.com"></script>
							<script src="https://unpkg.com/lucide@latest"></script>
							<script type="importmap"> 
    { 
      "imports": { 
        "react": "https://esm.sh/react@18.2.0", 
        "react-dom": "https://esm.sh/react-dom@18.2.0/client" 
      } 
    } 
    </script>
							<style> 
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); 
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; } 
        .ios-blur { backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%); } 
        .loader { border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; } 
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } 
    </style>
						</head>
						<body>
							<div id="root"></div>
							<script type="module"> 
        import React, { useState, useEffect } from 'react'; 
        import ReactDOM from 'react-dom'; 
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js"; 
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js"; 
        import { getFirestore, doc, collection, onSnapshot, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js"; 
 
        const firebaseConfig = { 
            apiKey: "AIzaSyDi9s3g6nyObg5mZYz_n7qgr982h2MrO0o", 
            authDomain: "cloud-ai-a1722.firebaseapp.com", 
            projectId: "cloud-ai-a1722", 
            storageBucket: "cloud-ai-a1722.firebasestorage.app", 
            messagingSenderId: "94852405834", 
            appId: "1:94852405834:web:4bba853d9a20807b84a4b3" 
        }; 
 
        const Icon = ({ name, size = 24, className = "" }) => { 
            const LucideIcon = window.lucide?.icons[name]; 
            return LucideIcon ? React.createElement(LucideIcon, { size, className }) : null; 
        }; 
 
        const App = () => { 
            const [view, setView] = useState('home'); 
            const [user, setUser] = useState(null); 
            const [loading, setLoading] = useState(true); 
            const [auth, setAuth] = useState(null); 
            const [db, setDb] = useState(null); 
            const [email, setEmail] = useState(''); 
            const [password, setPassword] = useState(''); 
            const [isRegister, setIsRegister] = useState(false); 
            const [error, setError] = useState(''); 
 
            useEffect(() => { 
                const app = initializeApp(firebaseConfig); 
                const fbAuth = getAuth(app); 
                const fbDb = getFirestore(app); 
                setAuth(fbAuth); 
                setDb(fbDb); 
 
                return onAuthStateChanged(fbAuth, (u) => { 
                    setUser(u); 
                    setLoading(false); 
                }); 
            }, []); 
 
            const handleAuth = async (e) => { 
                e.preventDefault(); 
                setError(''); 
                try { 
                    if (isRegister) await createUserWithEmailAndPassword(auth, email, password); 
                    else await signInWithEmailAndPassword(auth, email, password); 
                } catch (err) { 
                    setError(err.message.includes('auth/domain-config-required')  
                        ? "Fehler: Domain 'samkruw.github.io' muss in Firebase autorisiert werden!"  
                        : err.message); 
                } 
            }; 
 
            if (loading) return React.createElement('div', { className: 'min-h-screen flex items-center justify-center' }, React.createElement('div', { className: 'loader' })); 
 
            if (!user) { 
                return React.createElement('div', { className: 'min-h-screen flex items-center justify-center p-8' },  
                    React.createElement('div', { className: 'w-full max-w-sm space-y-8' }, 
                        React.createElement('h1', { className: 'text-5xl font-black italic text-center text-blue-600' }, 'CloudStream'), 
                        React.createElement('form', { onSubmit: handleAuth, className: 'space-y-4 bg-[#121212] p-8 rounded-[40px] border border-white/5 shadow-2xl' }, 
                            React.createElement('input', { type: 'email', placeholder: 'E-Mail', className: 'w-full bg-black border border-white/10 p-4 rounded-2xl outline-none', value: email, onChange: e => setEmail(e.target.value) }), 
                            React.createElement('input', { type: 'password', placeholder: 'Passwort', className: 'w-full bg-black border border-white/10 p-4 rounded-2xl outline-none', value: password, onChange: e => setPassword(e.target.value) }), 
                            error && React.createElement('p', { className: 'text-red-500 text-[10px] leading-tight' }, error), 
                            React.createElement('button', { className: 'w-full bg-blue-600 py-4 rounded-[20px] font-black' }, isRegister ? 'KONTO ERSTELLEN' : 'ANMELDEN') 
                        ), 
                        React.createElement('button', { onClick: () => setIsRegister(!isRegister), className: 'w-full text-gray-600 text-[10px] font-bold uppercase tracking-widest' },  
                            isRegister ? 'Zum Login' : 'Registrieren') 
                    ) 
                ); 
            } 
 
            return React.createElement('div', { className: 'min-h-screen p-6' }, 
                React.createElement('header', { className: 'pt-4' },  
                    React.createElement('h1', { className: 'text-4xl font-black italic' }, 'Willkommen'), 
                    React.createElement('p', { className: 'text-gray-500 text-xs mt-2' }, user.email) 
                ), 
                React.createElement('nav', { className: 'fixed bottom-0 left-0 right-0 ios-blur bg-black/60 p-8 flex justify-around border-t border-white/5' }, 
                    React.createElement('button', { onClick: () => setView('home'), className: 'text-blue-500' }, React.createElement(Icon, { name: 'Home' })), 
                    React.createElement('button', { onClick: () => signOut(auth), className: 'text-gray-500' }, React.createElement(Icon, { name: 'LogOut' })) 
                ) 
            ); 
        }; 
 
        const root = ReactDOM.createRoot(document.getElementById('root')); 
        root.render(React.createElement(App)); 
    </script>
						</body>
					</html>
				</p>
			</body>
		</html>
